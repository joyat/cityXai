global:
  scrape_interval: 15s

scrape_configs:
  - job_name: chat-api
    static_configs:
      - targets: ["chat-api:8001"]
    metrics_path: /metrics
  - job_name: ingest-api
    static_configs:
      - targets: ["ingest-api:8002"]
    metrics_path: /metrics
  - job_name: admin-api
    static_configs:
      - targets: ["admin-api:8003"]
    metrics_path: /metrics
  - job_name: ollama
    static_configs:
      - targets: ["ollama:11434"]
    metrics_path: /metrics
  - job_name: keycloak
    static_configs:
      - targets: ["keycloak:9000"]
    metrics_path: /metrics
  - job_name: chromadb
    static_configs:
      - targets: ["chromadb:8000"]
    metrics_path: /api/v1/metrics

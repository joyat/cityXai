events {}

http {
  resolver 127.0.0.11 ipv6=off valid=30s;
  limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=ingest_limit:10m rate=5r/m;

  server {
    listen 80;
    server_name _;
    location /healthz { return 200 "ok"; }
    location / { return 301 https://$host$request_uri; }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    location /healthz { return 200 "ok"; }
    location = /widget.js { alias /usr/share/nginx/widget/widget.js; }
    location /demo/ { alias /usr/share/nginx/demo/; index index.html; }

    location /api/chat/query {
      set $chat_query_upstream http://chat-api:8001;
      limit_req zone=chat_limit burst=5 nodelay;
      proxy_pass $chat_query_upstream/chat/query;
    }
    location /api/chat/ {
      set $chat_upstream http://chat-api:8001;
      proxy_pass $chat_upstream/chat/;
    }
    location /api/ingest/upload {
      set $ingest_upload_upstream http://ingest-api:8002;
      limit_req zone=ingest_limit burst=2 nodelay;
      proxy_pass $ingest_upload_upstream/ingest/upload;
    }
    location /api/ingest/ {
      set $ingest_upstream http://ingest-api:8002;
      proxy_pass $ingest_upstream/ingest/;
    }
    location /api/admin/ {
      set $admin_upstream http://admin-api:8003;
      proxy_pass $admin_upstream/admin/;
    }
    location /keycloak/ {
      set $keycloak_upstream http://keycloak:8080;
      proxy_pass $keycloak_upstream/;
    }
    location /grafana/ {
      set $grafana_upstream http://grafana:3000;
      proxy_pass $grafana_upstream/;
      proxy_set_header X-Forwarded-Prefix /grafana;
    }
    location / {
      set $frontend_upstream http://frontend:3000;
      proxy_pass $frontend_upstream/;
    }
  }
}

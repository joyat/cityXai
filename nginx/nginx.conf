events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  resolver 127.0.0.11 ipv6=off valid=30s;
  limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=ingest_limit:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=30r/m;
  server {
    listen 80;
    server_name _;
    location /healthz { return 200 "ok"; }
    location / { return 301 https://$host$request_uri; }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    set $chat_api http://chat-api:8001;
    set $ingest_api http://ingest-api:8002;
    set $admin_api http://admin-api:8003;
    set $keycloak_upstream http://keycloak:8080;
    set $grafana_upstream http://grafana:3000;
    set $frontend_upstream http://frontend:3000;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    location /healthz { return 200 "ok"; }
    location = /widget.js { alias /usr/share/nginx/widget/widget.js; }
    location /demo/    { alias /usr/share/nginx/demo/;    index index.html; }
    location = /landing { return 301 /main/; }
    location /landing/ { return 301 /main/; }
    location = /main    { return 301 /main/; }
    location /main/    { alias /usr/share/nginx/landing/; index index.html; }

	    location /api/chat/query {
	      limit_req zone=chat_limit burst=5 nodelay;
	      proxy_pass $chat_api/chat/query;
	    }
	    location /api/chat/ {
	      rewrite ^/api/chat/(.*)$ /chat/$1 break;
	      proxy_pass $chat_api;
	    }
	    location /api/ingest/upload {
	      limit_req zone=ingest_limit burst=2 nodelay;
	      proxy_pass $ingest_api/ingest/upload;
	    }
	    location /api/ingest/ {
	      rewrite ^/api/ingest/(.*)$ /ingest/$1 break;
	      proxy_pass $ingest_api;
	    }
	    location /api/admin/ {
	      limit_req zone=admin_limit burst=10 nodelay;
	      rewrite ^/api/admin/(.*)$ /admin/$1 break;
	      proxy_pass $admin_api;
	    }
	    location /keycloak/ {
	      rewrite ^/keycloak/(.*)$ /$1 break;
	      proxy_pass $keycloak_upstream;
	    }
    location /grafana/ {
      proxy_pass $grafana_upstream;
      proxy_set_header X-Forwarded-Prefix /grafana;
    }
    location / {
      proxy_pass $frontend_upstream;
    }
  }
}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" fill="none">
  <defs>
    <linearGradient id="g" x1="64" y1="3" x2="64" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a8f0ff"/>
      <stop offset="0.4" stop-color="#2ba8d4"/>
      <stop offset="1" stop-color="#0a2a5e"/>
    </linearGradient>
  </defs>

  <!-- Tower spire -->
  <line x1="64" y1="3" x2="64" y2="20" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tower cap -->
  <line x1="57" y1="20" x2="71" y2="20" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
  <!-- Tower mid section -->
  <line x1="60" y1="26" x2="68" y2="26" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
  <!-- Tower base block -->
  <rect x="59" y="30" width="10" height="5" rx="1.5" fill="url(#g)"/>

  <!-- Left buildings (outline only) -->
  <rect x="6"  y="50" width="11" height="66" stroke="url(#g)" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="21" y="35" width="13" height="81" stroke="url(#g)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Right buildings (mirrored) -->
  <rect x="94"  y="35" width="13" height="81" stroke="url(#g)" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="111" y="50" width="11" height="66" stroke="url(#g)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- X shape — the main mark -->
  <line x1="36" y1="34" x2="97" y2="115" stroke="url(#g)" stroke-width="7" stroke-linecap="round"/>
  <line x1="92" y1="34" x2="31" y2="115" stroke="url(#g)" stroke-width="7" stroke-linecap="round"/>
</svg>
